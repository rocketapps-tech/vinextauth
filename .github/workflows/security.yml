name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 06:00 UTC

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify zero runtime dependencies in library
        # The library must have zero runtime deps — this is a core architectural constraint.
        # Apps use vite/esbuild which have known dev-only vulnerabilities; those are excluded.
        run: |
          DEPS=$(node -e "const p = require('./packages/vinext-auth/package.json'); console.log(Object.keys(p.dependencies || {}).length)")
          if [ "$DEPS" != "0" ]; then
            echo "❌ Library has $DEPS runtime dependencies — must stay at zero."
            exit 1
          fi
          echo "✅ Library has zero runtime dependencies."

      - name: Audit dev dependencies
        run: npm audit --audit-level=high
        continue-on-error: true

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript
