name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: ${{ github.event_name == 'push' && 'Deploy (production)' || 'Deploy (preview)' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to production
        if: github.event_name == 'push'
        id: deploy-prod
        run: npx vinext deploy
        working-directory: docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy preview
        if: github.event_name == 'pull_request'
        id: deploy-preview
        run: npx vinext deploy --preview
        working-directory: docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && steps.deploy-preview.outcome == 'success'
        uses: actions/github-script@v9
        with:
          script: |
            const output = `${{ steps.deploy-preview.outputs.command-output || '' }}`;
            const urlMatch = output.match(/https:\/\/[^\s]+\.workers\.dev[^\s]*/);
            const url = urlMatch ? urlMatch[0] : '(deploy concluído — veja a URL no Cloudflare dashboard)';

            const marker = '<!-- deploy-docs-preview -->';
            const body = `${marker}\n### Docs preview\n\n${url}\n\n_Atualizado em ${new Date().toUTCString()}_`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
